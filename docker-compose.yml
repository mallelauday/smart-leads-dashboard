version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: smart-leads-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-network

  server:
    build: ./server
    container_name: smart-leads-server
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongo
    networks:
      - smart-leads-network

  client:
    build: ./client
    container_name: smart-leads-client
    ports:
      - '3000:3000'
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - server
    networks:
      - smart-leads-network

volumes:
  mongo_data:

networks:
  smart-leads-network:
    driver: bridge
